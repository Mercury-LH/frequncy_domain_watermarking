dataset:
  image: data/misc/boat.512.tiff
  watermark: data/watermark/logo.png
  image_size: [512, 512]
  images:
    - name: boat_gray
      path: data/misc/boat.512.tiff
      source_type: gray
    - name: gray21_gray
      path: data/misc/gray21.512.tiff
      source_type: gray
    - name: texture_gray
      path: data/misc/5.1.09.tiff
      source_type: gray
    - name: pattern_gray
      path: data/misc/5.2.08.tiff
      source_type: gray
    - name: house_color
      path: data/misc/house.tiff
      source_type: color
    - name: airplane_color
      path: data/misc/4.2.03.tiff
      source_type: color
    - name: bsd_color
      path: data/images/test/101085.jpg
      source_type: color
    - name: bsd_landscape_color
      path: data/images/test/103070.jpg
      source_type: color
    - name: bsd_train_color
      path: data/images/train/100075.jpg
      source_type: color
    - name: bsd_texture_color
      path: data/images/train/189003.jpg
      source_type: color

output:
  root: outputs

methods:
  dft:
    alpha: 10.0
    watermark_size: [64, 64]
    radius_ratio: 0.28
  dct:
    delta: 12.0
    block_size: 8
    watermark_size: [32, 32]
    coeff_pair: [[3, 4], [4, 3]]
  dwt:
    alpha: 0.05
    wavelet: haar
    subband: hl
    watermark_size: [64, 64]

experiments:
  methods: [dft, dct, dwt]
  strengths:
    dft: [2, 5, 10, 20, 40]
    dct: [2, 5, 10, 20, 40]
    dwt: [0.01, 0.03, 0.05, 0.1]
  jpeg_qualities: [90, 70, 50, 30]
  noise_sigmas: [5, 10, 20]
  scale_factors: [0.5, 0.75, 1.5]
