name: test-and-deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - run: pip install -r webapp/backend/requirements.txt pytest==8.0.2 httpx==0.27.0
      - run: pytest webapp/backend/tests -q
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/frontend/package-lock.json
      - run: npm ci
        working-directory: webapp/frontend
      - run: npm test
        working-directory: webapp/frontend
      - run: npm run build
        working-directory: webapp/frontend

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble Space tree and push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          # The Space only needs the deployable subset. Push it as a single
          # history-free commit so the research repo's large PDFs / data / zips
          # never reach HF (which rejects any file >10MiB without LFS).
          stage="$(mktemp -d)"
          cp -r src webapp Dockerfile .dockerignore README.md "$stage"/
          rm -rf "$stage"/webapp/frontend/node_modules "$stage"/webapp/frontend/dist
          cd "$stage"
          git init -q -b main
          git config user.email "deploy@github-actions"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA::7} from ${GITHUB_REPOSITORY}"
          git push --force "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" main
