name: test-and-deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - run: pip install -r webapp/backend/requirements.txt pytest==8.0.2 httpx==0.27.0
      - run: pytest webapp/backend/tests -q
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/frontend/package-lock.json
      - run: npm ci
        working-directory: webapp/frontend
      - run: npm test
        working-directory: webapp/frontend
      - run: npm run build
        working-directory: webapp/frontend

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Upload deployable subset to the Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          # The Space only needs the deployable subset. Uploading via
          # huggingface_hub (not raw git) keeps the research repo's large
          # PDFs/data/zips out AND transparently handles LFS/Xet for the binary
          # story assets, which HF rejects on a plain git push.
          pip install "huggingface_hub>=0.25"
          stage="$(mktemp -d)"
          cp -r src webapp Dockerfile .dockerignore README.md "$stage"/
          rm -rf "$stage"/webapp/frontend/node_modules "$stage"/webapp/frontend/dist
          python - "$stage" <<'PY'
          import os, sys
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path=sys.argv[1],
              repo_id=os.environ["HF_SPACE"],
              repo_type="space",
              delete_patterns=["*"],  # clean sync: drop the HF starter files
              commit_message=f"Deploy {os.environ.get('GITHUB_SHA','')[:7]} from {os.environ.get('GITHUB_REPOSITORY','')}",
          )
          print("uploaded to", os.environ["HF_SPACE"])
          PY
